[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "astra"
version = "0.1.0"
description = "A build and deployment tool for AviUtl ExEdit2 scripts."
requires-python = ">=3.11.9"
authors = [
    { name = "Korarei" }
]
dependencies = [
    "jsonschema>=4.25.1"
]

[project.scripts]
astra = "astra.cli:main"
